name: Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: build/packages/*
          - os: windows-latest
            artifact: build/bin/self-ledger.exe
          - os: macos-latest
            artifact: build/bin/self-ledger-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Build
        run: wails build -tags webkit2_4_1

      - name: Package Linux (.deb and .rpm)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          mkdir -p build/packages
          cp build/bin/self-ledger build/packages/self-ledger
          VERSION="$VERSION" nfpm package --packager deb --target build/packages/
          VERSION="$VERSION" nfpm package --packager rpm --target build/packages/

      - name: Package macOS app bundle
        if: matrix.os == 'macos-latest'
        run: zip -r build/bin/self-ledger-macos.zip build/bin/self-ledger.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-ledger-${{ github.ref_name }}-${{ matrix.os }}
          path: ${{ matrix.artifact }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
