name: self-ledger
arch: amd64
platform: linux
version: ${VERSION}
maintainer: gv
description: Local-first personal finance desktop app. No cloud, no accounts — all data in SQLite on your machine.
contents:
  - src: build/bin/self-ledger
    dst: /usr/local/bin/self-ledger
  - src: frontend/static/favicon.png
    dst: /usr/share/pixmaps/self-ledger.png
  - src: self-ledger.desktop
    dst: /usr/share/applications/self-ledger.desktop
overrides:
  deb:
    depends:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
  rpm:
    depends:
      - webkit2gtk4.1
      - gtk3
